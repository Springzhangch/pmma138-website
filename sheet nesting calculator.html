<script>
        document.addEventListener('DOMContentLoaded', function() {
            const calculateBtn = document.getElementById('calculateBtn');
            const methodButtons = document.querySelectorAll('.method-btn');
            const resultCountElement = document.getElementById('resultCount');
            const resultUtilizationElement = document.getElementById('resultUtilization');
            const verticalPiecesElement = document.getElementById('verticalPieces');
            const horizontalPiecesElement = document.getElementById('horizontalPieces');
            const layoutMethodTitleElement = document.getElementById('layoutMethodTitle');
            const sheetSizeInfoElement = document.getElementById("sheetSizeInfo");
            
            // 存储计算结果
            let layoutMethod1 = null;
            let layoutMethod2 = null;
            let complexLayout = null;
            let bestLayout = null;
            let currentScale = 1;
            
            // 初始状态
            resultCountElement.textContent = '等待计算...';
            resultUtilizationElement.textContent = '等待计算...';
            verticalPiecesElement.textContent = '等待计算...';
            horizontalPiecesElement.textContent = '等待计算...';
            layoutMethodTitleElement.textContent = '等待计算...';
            
            calculateBtn.addEventListener("click", function() {
                calculateAndRender();
            });
            
            methodButtons.forEach(button => {
                button.addEventListener('click', function() {
                    methodButtons.forEach(btn => btn.classList.remove('active'));
                    this.classList.add('active');
                    
                    const sheetWidth = parseFloat(document.getElementById('sheetWidth').value);
                    const sheetHeight = parseFloat(document.getElementById('sheetHeight').value);
                    const partWidth = parseFloat(document.getElementById('partWidth').value);
                    const partHeight = parseFloat(document.getElementById('partHeight').value);
                    const gap = parseFloat(document.getElementById('gap').value);
                    
                    if (!isValidInputs(sheetWidth, sheetHeight, partWidth, partHeight, gap)) {
                        return;
                    }
                    
                    const method = this.dataset.method;
                    renderLayout(sheetWidth, sheetHeight, partWidth + gap, partHeight + gap, method);
                });
            });
            
            function calculateAndRender() {
                const sheetWidth = parseFloat(document.getElementById('sheetWidth').value);
                const sheetHeight = parseFloat(document.getElementById('sheetHeight').value);
                const partWidth = parseFloat(document.getElementById('partWidth').value);
                const partHeight = parseFloat(document.getElementById('partHeight').value);
                const gap = parseFloat(document.getElementById('gap').value);
                
                if (!isValidInputs(sheetWidth, sheetHeight, partWidth, partHeight, gap)) {
                    alert('请输入有效的数字（大于0）');
                    return;
                }
                
                // 更新板材尺寸信息
                sheetSizeInfoElement.textContent = `板材尺寸: ${sheetWidth} x ${sheetHeight} mm`;
                
                // 计算三种排料方式
                layoutMethod1 = calculateLayoutMethod1(sheetWidth, sheetHeight, partWidth + gap, partHeight + gap);
                layoutMethod2 = calculateLayoutMethod2(sheetWidth, sheetHeight, partWidth + gap, partHeight + gap);
                complexLayout = calculateComplexLayout(sheetWidth, sheetHeight, partWidth, partHeight, gap);
                
                // 计算最优方案
                bestLayout = calculateBestLayout(layoutMethod1, layoutMethod2, complexLayout);
                
                // 更新按钮上的开料数量
                updateButtonPieceCounts();
                
                // 更新计算结果摘要
                resultCountElement.textContent = `${bestLayout.totalPieces} 个零件`;
                
                // 计算板材利用率
                const sheetArea = sheetWidth * sheetHeight;
                const partArea = partWidth * partHeight * bestLayout.totalPieces;
                const utilization = (partArea / sheetArea * 100).toFixed(1);
                resultUtilizationElement.textContent = `${utilization}%`;
                
                // 更新竖放和横放零件数量
                if (bestLayout.method === 'complex') {
                    verticalPiecesElement.textContent = `${complexLayout.verticalPieces} 个`;
                    horizontalPiecesElement.textContent = `${complexLayout.horizontalPieces} 个`;
                } else {
                    verticalPiecesElement.textContent = '0 个';
                    horizontalPiecesElement.textContent = '0 个';
                }
                
                // 渲染最优方案
                renderLayout(sheetWidth, sheetHeight, partWidth + gap, partHeight + gap, 'best');
            }
            
            function updateButtonPieceCounts() {
                const method1Btn = document.querySelector('.method-btn[data-method="1"]');
                const method2Btn = document.querySelector('.method-btn[data-method="2"]');
                const complexBtn = document.querySelector('.method-btn[data-method="complex"]');
                const bestBtn = document.querySelector('.method-btn[data-method="best"]');
                
                if (layoutMethod1) {
                    method1Btn.querySelector('.piece-count').textContent = `(${layoutMethod1.totalPieces}片)`;
                }
                
                if (layoutMethod2) {
                    method2Btn.querySelector('.piece-count').textContent = `(${layoutMethod2.totalPieces}片)`;
                }
                
                if (complexLayout) {
                    complexBtn.querySelector('.piece-count').textContent = `(${complexLayout.totalPieces}片)`;
                }
                
                if (bestLayout) {
                    bestBtn.querySelector('.piece-count').textContent = `(${bestLayout.totalPieces}片)`;
                }
            }
            
            function calculateBestLayout(layout1, layout2, complexLayout) {
                let best = layout1;
                let bestMethod = 1;
                
                if (layout2.totalPieces > best.totalPieces) {
                    best = layout2;
                    bestMethod = 2;
                }
                
                if (complexLayout.totalPieces > best.totalPieces) {
                    best = complexLayout;
                    bestMethod = 'complex';
                }
                
                return {
                    pieces: best.pieces,
                    remnants: best.remnants,
                    totalPieces: best.totalPieces,
                    method: bestMethod,
                    verticalPieces: best.verticalPieces || 0,
                    horizontalPieces: best.horizontalPieces || 0
                };
            }
            
            // 复杂运算方案
            function calculateComplexLayout(sheetWidth, sheetHeight, partWidth, partHeight, gap) {
                let bestLayout = {
                    totalPieces: 0,
                    verticalColumns: 0,
                    verticalRows: 0,
                    horizontalColumns: 0,
                    horizontalRows: 0,
                    utilization: 0,
                    verticalWidth: 0,
                    horizontalWidth: 0,
                    pieces: [],
                    remnants: [],
                    verticalPieces: 0,
                    horizontalPieces: 0
                };
                
                const partWidthGap = partWidth + gap;
                const partHeightGap = partHeight + gap;
                
                // 计算最大可能的初始竖放列数
                const maxVerticalColumns = Math.floor(sheetWidth / partWidthGap);
                
                // 尝试不同数量的初始竖放列
                for (let verticalCols = 0; verticalCols <= maxVerticalColumns; verticalCols++) {
                    // 计算竖放区域占用宽度
                    const verticalWidth = verticalCols > 0 ? verticalCols * partWidthGap : 0;
                    
                    // 剩余宽度用于横放零件
                    const remainingWidth = sheetWidth - verticalWidth;
                    
                    // 计算可放置的横放列数
                    const horizontalCols = Math.floor(remainingWidth / partHeightGap);
                    
                    // 计算竖放区域可放置的行数
                    const verticalRows = verticalCols > 0 ? Math.floor(sheetHeight / partHeightGap) : 0;
                    
                    // 计算横放区域可放置的行数
                    const horizontalRows = horizontalCols > 0 ? Math.floor(sheetHeight / partWidthGap) : 0;
                    
                    // 计算总零件数
                    const totalPieces = verticalCols * verticalRows + horizontalCols * horizontalRows;
                    
                    // 计算材料利用率
                    const usedArea = totalPieces * partWidth * partHeight;
                    const sheetArea = sheetWidth * sheetHeight;
                    const utilization = (usedArea / sheetArea) * 100;
                    
                    // 更新最优方案
                    if (totalPieces > bestLayout.totalPieces || 
                        (totalPieces === bestLayout.totalPieces && utilization > bestLayout.utilization)) {
                        bestLayout = {
                            totalPieces,
                            verticalColumns: verticalCols,
                            verticalRows,
                            horizontalColumns: horizontalCols,
                            horizontalRows,
                            utilization,
                            verticalWidth,
                            horizontalWidth: horizontalCols > 0 ? horizontalCols * partHeightGap : 0,
                            pieces: [],
                            remnants: [],
                            verticalPieces: verticalCols * verticalRows,
                            horizontalPieces: horizontalCols * horizontalRows
                        };
                    }
                }
                
                // 生成零件位置
                const pieces = [];
                
                // 创建竖放零件
                for (let col = 0; col < bestLayout.verticalColumns; col++) {
                    for (let row = 0; row < bestLayout.verticalRows; row++) {
                        pieces.push({
                            x: col * partWidthGap,
                            y: row * partHeightGap,
                            width: partWidthGap,
                            height: partHeightGap,
                            fromRemnant: false,
                            isHorizontal: false,
                            name: `V${col+1}-${row+1}`
                        });
                    }
                }
                
                // 创建横放零件
                for (let col = 0; col < bestLayout.horizontalColumns; col++) {
                    for (let row = 0; row < bestLayout.horizontalRows; row++) {
                        pieces.push({
                            x: bestLayout.verticalWidth + col * partHeightGap,
                            y: row * partWidthGap,
                            width: partHeightGap,
                            height: partWidthGap,
                            fromRemnant: false,
                            isHorizontal: true,
                            name: `H${col+1}-${row+1}`
                        });
                    }
                }
                
                bestLayout.pieces = pieces;
                bestLayout.remnants = [];
                
                return bestLayout;
            }
            
            function isValidInputs(...inputs) {
                return inputs.every(input => !isNaN(input) && input > 0);
            }
            
            function renderLayout(sheetWidth, sheetHeight, partWidthGap, partHeightGap, method) {
                const visualizationArea = document.getElementById('visualizationArea');
                visualizationArea.innerHTML = '';
                
                const scale = calculateScale(sheetWidth, sheetHeight, visualizationArea);
                const scaledSheetWidth = sheetWidth * scale;
                const scaledSheetHeight = sheetHeight * scale;
                
                const sheet = document.createElement('div');
                sheet.className = 'sheet';
                sheet.style.width = `${scaledSheetWidth}px`;
                sheet.style.height = `${scaledSheetHeight}px`;
                
                let layoutData = null;
                let methodName = '';
                
                if (method === '1') {
                    layoutData = layoutMethod1;
                    methodName = '排料方式 1';
                } else if (method === '2') {
                    layoutData = layoutMethod2;
                    methodName = '排料方式 2';
                } else if (method === 'complex') {
                    layoutData = complexLayout;
                    methodName = '复杂运算方案';
                } else if (method === 'best') {
                    layoutData = bestLayout;
                    if (bestLayout.method === 1) {
                        methodName = '最优方案（方式1）';
                    } else if (bestLayout.method === 2) {
                        methodName = '最优方案（方式2）';
                    } else if (bestLayout.method === 'complex') {
                        methodName = '最优方案（复杂运算）';
                    }
                }
                
                if (layoutData) {
                    addPiecesToSheet(sheet, layoutData.pieces, scale);
                    addRemnantsToSheet(sheet, layoutData.remnants, scale);
                    layoutMethodTitleElement.textContent = `${methodName}：开料数量 ${layoutData.totalPieces} 片`;
                }
                
                visualizationArea.appendChild(sheet);
            }
            
            function calculateScale(sheetWidth, sheetHeight, container) {
                const containerWidth = container.clientWidth - 40;
                const containerHeight = container.clientHeight - 40;
                
                const scaleX = containerWidth / sheetWidth;
                const scaleY = containerHeight / sheetHeight;
                
                return Math.min(scaleX, scaleY, 0.6);
            }
            
            function calculateLayoutMethod1(sheetWidth, sheetHeight, partWidthGap, partHeightGap) {
                // 方式1：横切纵切（先切宽度方向，再切高度方向）
                const cols = Math.floor(sheetWidth / partHeightGap);
                const rows = Math.floor(sheetHeight / partWidthGap);
                const mainPieces = cols * rows;
                
                // 剩余部分1：切完高度方向后剩下的部分
                const remnant1 = {
                    x: 0,
                    y: rows * partWidthGap,
                    width: cols * partHeightGap,
                    height: sheetHeight - rows * partWidthGap
                };
                
                // 剩余部分2：切完宽度方向后剩下的部分
                const remnant2 = {
                    x: cols * partHeightGap,
                    y: 0,
                    width: sheetWidth - cols * partHeightGap,
                    height: sheetHeight
                };
                
                // 在剩余部分中尝试开料
                const piecesFromRemnant1 = calculateRemnantPieces(remnant1, partWidthGap, partHeightGap);
                const piecesFromRemnant2 = calculateRemnantPieces(remnant2, partWidthGap, partHeightGap);
                
                const pieces = [];
                
                // 主区域零件
                for (let r = 0; r < rows; r++) {
                    for (let c = 0; c < cols; c++) {
                        pieces.push({
                            x: c * partHeightGap,
                            y: r * partWidthGap,
                            width: partHeightGap,
                            height: partWidthGap,
                            fromRemnant: false,
                            isHorizontal: false,
                            name: `P${r+1}-${c+1}`
                        });
                    }
                }
                
                // 余料中切割出的零件
                pieces.push(...piecesFromRemnant1, ...piecesFromRemnant2);
                
                // 记录余料信息
                const remnants = [remnant1, remnant2];
                
                return {
                    pieces: pieces,
                    remnants: remnants,
                    totalPieces: pieces.length,
                    method: 1
                };
            }
            
            function calculateLayoutMethod2(sheetWidth, sheetHeight, partWidthGap, partHeightGap) {
                // 方式2：纵切横切（先切高度方向，再切宽度方向）
                const cols = Math.floor(sheetWidth / partWidthGap);
                const rows = Math.floor(sheetHeight / partHeightGap);
                const mainPieces = cols * rows;
                
                // 剩余部分1：切完宽度方向后剩下的部分
                const remnant1 = {
                    x: cols * partWidthGap,
                    y: 0,
                    width: sheetWidth - cols * partWidthGap,
                    height: sheetHeight
                };
                
                // 剩余部分2：切完高度方向后剩下的部分
                const remnant2 = {
                    x: 0,
                    y: rows * partHeightGap,
                    width: sheetWidth,
                    height: sheetHeight - rows * partHeightGap
                };
                
                // 在剩余部分中尝试开料
                const piecesFromRemnant1 = calculateRemnantPieces(remnant1, partWidthGap, partHeightGap);
                const piecesFromRemnant2 = calculateRemnantPieces(remnant2, partWidthGap, partHeightGap);
                
                const pieces = [];
                
                // 主区域零件
                for (let r = 0; r < rows; r++) {
                    for (let c = 0; c < cols; c++) {
                        pieces.push({
                            x: c * partWidthGap,
                            y: r * partHeightGap,
                            width: partWidthGap,
                            height: partHeightGap,
                            fromRemnant: false,
                            isHorizontal: false,
                            name: `P${r+1}-${c+1}`
                        });
                    }
                }
                
                // 余料中切割出的零件
                pieces.push(...piecesFromRemnant1, ...piecesFromRemnant2);
                
                // 记录余料信息
                const remnants = [remnant1, remnant2];
                
                return {
                    pieces: pieces,
                    remnants: remnants,
                    totalPieces: pieces.length,
                    method: 2
                };
            }
            
            function calculateRemnantPieces(remnant, partWidthGap, partHeightGap) {
                const pieces = [];
                
                // 在剩余材料中尝试两种不同的开料方向
                // 方向1：零件正常方向
                const rows1 = Math.floor(remnant.width / partWidthGap);
                const cols1 = Math.floor(remnant.height / partHeightGap);
                const count1 = rows1 * cols1;
                
                // 方向2：零件旋转90度
                const rows2 = Math.floor(remnant.width / partHeightGap);
                const cols2 = Math.floor(remnant.height / partWidthGap);
                const count2 = rows2 * cols2;
                
                // 选择数量多的开料方式
                if (count1 >= count2 && count1 > 0) {
                    for (let r = 0; r < rows1; r++) {
                        for (let c = 0; c < cols1; c++) {
                            pieces.push({
                                x: remnant.x + r * partWidthGap,
                                y: remnant.y + c * partHeightGap,
                                width: partWidthGap,
                                height: partHeightGap,
                                fromRemnant: true,
                                isHorizontal: false,
                                name: `R${r+1}-${c+1}`
                            });
                        }
                    }
                } else if (count2 > 0) {
                    for (let r = 0; r < rows2; r++) {
                        for (let c = 0; c < cols2; c++) {
                            pieces.push({
                                x: remnant.x + r * partHeightGap,
                                y: remnant.y + c * partWidthGap,
                                width: partHeightGap,
                                height: partWidthGap,
                                fromRemnant: true,
                                isHorizontal: true,
                                name: `R${r+1}-${c+1}`
                            });
                        }
                    }
                }
                
                return pieces;
            }
            
            function addPiecesToSheet(sheet, pieces, scale) {
                pieces.forEach(piece => {
                    const partElement = document.createElement('div');
                    let className = 'part';
                    if (piece.fromRemnant) {
                        className += ' remnant-piece';
                    } else if (piece.isHorizontal) {
                        className += ' horizontal';
                    }
                    partElement.className = className;
                    
                    partElement.style.left = `${piece.x * scale}px`;
                    partElement.style.top = `${piece.y * scale}px`;
                    partElement.style.width = `${piece.width * scale}px`;
                    partElement.style.height = `${piece.height * scale}px`;
                    
                    // 添加零件文本标签
                    if (piece.width > 50 && piece.height > 30) {
                        partElement.textContent = piece.name;
                    }
                    
                    sheet.appendChild(partElement);
                });
            }
            
            function addRemnantsToSheet(sheet, remnants, scale) {
                remnants.forEach((remnant, index) => {
                    if (remnant.width > 0 && remnant.height > 0) {
                        const remnantElement = document.createElement('div');
                        remnantElement.className = 'remnant';
                        
                        remnantElement.style.position = 'absolute';
                        remnantElement.style.left = `${remnant.x * scale}px`;
                        remnantElement.style.top = `${remnant.y * scale}px`;
                        remnantElement.style.width = `${remnant.width * scale}px`;
                        remnantElement.style.height = `${remnant.height * scale}px`;
                        
                        remnantElement.style.backgroundColor = 'rgba(241, 196, 15, 0.2)';
                        remnantElement.style.border = '1px dashed #f1c40f';
                        
                        // 添加余料标签
                        const label = document.createElement('div');
                        label.className = 'info-marker';
                        label.textContent = `${remnant.width.toFixed(0)}x${remnant.height.toFixed(0)}`;
                        label.style.top = '4px';
                        label.style.left = '4px';
                        remnantElement.appendChild(label);
                        
                        sheet.appendChild(remnantElement);
                    }
                });
            }
        });
    </script>
</body>
